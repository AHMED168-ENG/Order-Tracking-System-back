name: Deploy Backend

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies and Build
        run: |
          npm install
          npm run build

      - name: Transfer Build to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist,package.json,package-lock.json"
          target: "/var/www/senior-jacket/backend"

      - name: SSH into server and Restart PM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/senior-jacket/backend
            # Install only production dependencies (much faster and avoids build tools)
            npm install --omit=dev
            # Restart or Start the process
            pm2 delete back || true
            pm2 start dist/main.js --name back
            pm2 save
